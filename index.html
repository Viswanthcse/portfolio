<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viswanth Jaladi — Data Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   M3 TOKENS — BLUE SEED (Cobalt)
════════════════════════════════════════════ */
:root {
  /* Primary — Blue */
  --p10:#001848; --p20:#002D7A; --p30:#0042A8; --p40:#1A5CCC;
  --p50:#3A78E8; --p60:#5E94FF; --p70:#89AEFF; --p80:#B0C6FF;
  --p90:#DAE2FF; --p95:#EEF0FF; --p99:#FEFBFF;

  /* Secondary — Teal accent */
  --s10:#002117; --s20:#003827; --s30:#005236; --s40:#006C47;
  --s70:#27BF8C; --s80:#51DBA8; --s90:#74F8C3; --s95:#BAFDE1;

  /* Tertiary — Cyan */
  --t10:#001F2A; --t20:#003547; --t30:#004E6A; --t40:#006688;
  --t70:#00B4D8; --t80:#5DD5F5; --t90:#B3EAFB;

  /* Error */
  --e40:#BA1A1A; --e80:#FFB4AB; --e90:#FFDAD6;

  /* Neutral */
  --n10:#191B23; --n20:#2E3038; --n30:#454750; --n40:#5D5F6B;
  --n50:#767882; --n60:#908FA0; --n70:#ABABBA; --n80:#C6C5D5;
  --n90:#E3E1F1; --n95:#F1EFFF; --n99:#FEFBFF;

  /* Neutral-variant */
  --nv20:#1E2132; --nv30:#343747; --nv40:#4B4D5F; --nv50:#636579;
  --nv60:#7D7F93; --nv70:#979AAD; --nv80:#B1B4C8; --nv90:#CDD0E4;

  /* ── LIGHT SCHEME ── */
  --md-primary:             #1A5CCC;
  --md-on-primary:          #FFFFFF;
  --md-primary-container:   #DAE2FF;
  --md-on-primary-container:#001848;

  --md-secondary:           #006C47;
  --md-on-secondary:        #FFFFFF;
  --md-secondary-container: #74F8C3;
  --md-on-secondary-container:#002117;

  --md-tertiary:            #006688;
  --md-on-tertiary:         #FFFFFF;
  --md-tertiary-container:  #B3EAFB;
  --md-on-tertiary-container:#001F2A;

  --md-error:               #BA1A1A;
  --md-error-container:     #FFDAD6;

  --md-surface:             #FEFBFF;
  --md-on-surface:          #1B1B1F;
  --md-surface-variant:     #E3E1F1;
  --md-on-surface-variant:  #46464F;
  --md-outline:             #777680;
  --md-outline-variant:     #C7C5D5;

  --md-surf-low:    #F1EFFF;
  --md-surf-c:      #ECEAF8;
  --md-surf-high:   #E6E4F3;
  --md-surf-highest:#E1DFEE;
  --md-surf-lowest: #FFFFFF;

  --md-inverse-surface: #303036;
  --md-inverse-on-surf: #F3F0FF;
  --md-inverse-primary: #B0C6FF;

  /* Elevation shadows */
  --e1: 0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);
  --e2: 0 1px 2px rgba(0,0,0,.3),0 2px 6px 2px rgba(0,0,0,.15);
  --e3: 0 4px 8px 3px rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.3);
  --e4: 0 6px 10px 4px rgba(0,0,0,.15),0 2px 3px rgba(0,0,0,.3);

  /* Shape */
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:28px; --r-full:9999px;

  /* Motion */
  --dur-s:100ms; --dur-m:200ms; --dur-l:400ms; --dur-xl:500ms;
  --ease-std:cubic-bezier(.2,0,0,1);
  --ease-dec:cubic-bezier(.05,.7,.1,1);
  --ease-acc:cubic-bezier(.3,0,.8,.15);

  /* Game / dark theme */
  --g-bg:#050A1A;
  --g-accent:#5E94FF;
  --g-teal:#51DBA8;
  --g-cyan:#5DD5F5;
  --g-warn:#FFD080;
  --g-pipe:#89AEFF;
}

/* ════════ RESET ════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Google Sans',system-ui,sans-serif}
body{overflow:hidden;background:var(--g-bg)}
.msr{font-family:'Material Symbols Rounded';font-style:normal;line-height:1;user-select:none}

/* ════════ SCREENS ════════ */
.screen{position:fixed;inset:0;transition:opacity var(--dur-l) var(--ease-std),transform var(--dur-l) var(--ease-std)}
.screen.off{opacity:0;transform:scale(.97);pointer-events:none;visibility:hidden;transition:opacity var(--dur-m) var(--ease-acc),transform var(--dur-m) var(--ease-acc),visibility 0s var(--dur-m)}
.screen.on{opacity:1;transform:scale(1);pointer-events:all;visibility:visible}

/* ═══════════════════════════════════════
   HOME SCREEN (landing — no click needed)
═══════════════════════════════════════ */
#home-screen{
  background:var(--md-surface);
  display:flex;flex-direction:column;
  z-index:2;
}

/* ── M3 TOP APP BAR ── */
.top-bar{
  flex-shrink:0;
  background:var(--md-surf-low);
  transition:background var(--dur-m) var(--ease-std),box-shadow var(--dur-m) var(--ease-std);
  z-index:20;
}
.top-bar.scrolled{
  background:color-mix(in srgb,var(--md-primary) 8%,var(--md-surf-low));
  box-shadow:var(--e2);
}
.top-bar-row{display:flex;align-items:center;height:64px;padding:0 8px;gap:4px}
.ibtn{
  width:48px;height:48px;border-radius:var(--r-full);
  border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--md-on-surface);position:relative;overflow:hidden;
}
.ibtn::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:opacity var(--dur-s)}
.ibtn:hover::after{opacity:.08}.ibtn:active::after{opacity:.12}
.ibtn .msr{font-size:24px;position:relative;z-index:1}
.bar-title{flex:1;padding:0 6px;font-family:'Google Sans Display',sans-serif;font-size:22px;font-weight:400;color:var(--md-on-surface);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── HOME BODY ── */
.home-body{display:flex;flex:1;overflow:hidden}

/* NAV RAIL */
.nav-rail{
  width:88px;flex-shrink:0;
  background:var(--md-surf-low);
  border-right:1px solid var(--md-outline-variant);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:2px;overflow:hidden;
}
.rail-fab{
  width:56px;height:56px;border-radius:var(--r-lg);
  background:var(--md-primary-container);
  color:var(--md-on-primary-container);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--e1);margin-bottom:12px;
  transition:box-shadow var(--dur-m),transform var(--dur-m);
}
.rail-fab:hover{box-shadow:var(--e2);transform:scale(1.05)}
.rail-fab .msr{font-size:24px}
.rail-item{
  width:80px;min-height:60px;
  border-radius:var(--r-full);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;border:none;background:transparent;
  position:relative;
}
.rail-pill{
  width:64px;height:32px;border-radius:var(--r-full);
  display:flex;align-items:center;justify-content:center;
  transition:background var(--dur-m) var(--ease-std);
  position:relative;
}
.rail-item:hover .rail-pill{background:color-mix(in srgb,var(--md-primary) 8%,transparent)}
.rail-item.active .rail-pill{background:var(--md-primary-container)}
.rail-item .msr{font-size:22px;color:var(--md-on-surface-variant);position:relative;z-index:1;transition:color var(--dur-m)}
.rail-item.active .msr{color:var(--md-on-primary-container)}
.rail-lbl{font-size:12px;font-weight:500;color:var(--md-on-surface-variant);text-align:center;line-height:1.2;transition:color var(--dur-m),font-weight var(--dur-m)}
.rail-item.active .rail-lbl{color:var(--md-on-surface);font-weight:700}

/* CONTENT SCROLL */
.home-scroll{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--md-surface)}
.home-inner{padding:20px;max-width:840px;padding-bottom:32px}

/* ── HERO NAME — centered bubbly drop ── */
.hero-card{
  background:linear-gradient(145deg,var(--p20) 0%,var(--p30) 45%,var(--p40) 75%,#2E5ECC 100%);
  border-radius:var(--r-xl);padding:40px 28px 36px;margin-bottom:14px;
  position:relative;overflow:hidden;box-shadow:var(--e3);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  min-height:280px;
}
.hero-grid{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:30px 30px}
.hero-name-wrap{
  position:relative;z-index:1;
  margin-bottom:16px;
}
/* Each word drops in separately */
.hero-word{
  display:block;
  font-family:'Google Sans Display',sans-serif;
  color:#fff;line-height:1.0;
  transform-origin:center bottom;
  opacity:0;
}
.hero-word.first{
  font-size:clamp(38px,7vw,68px);
  font-weight:300;
  letter-spacing:-.01em;
  animation:bubbleDrop 0.65s cubic-bezier(.22,1.8,.36,1) 0.1s both;
}
.hero-word.last{
  font-size:clamp(44px,8vw,80px);
  font-weight:800;
  letter-spacing:-.03em;
  animation:bubbleDrop 0.65s cubic-bezier(.22,1.8,.36,1) 0.28s both;
}
/* The jiggle after landing */
@keyframes bubbleDrop{
  0%  { opacity:0; transform:translateY(-60px) scaleX(.7) scaleY(1.3); }
  55% { opacity:1; transform:translateY(8px)   scaleX(1.08) scaleY(.92); }
  70% { transform:translateY(-5px) scaleX(.97) scaleY(1.05); }
  82% { transform:translateY(3px)  scaleX(1.03) scaleY(.97); }
  91% { transform:translateY(-2px) scaleX(.99) scaleY(1.01); }
  100%{ opacity:1; transform:translateY(0) scaleX(1) scaleY(1); }
}

/* Subtitle fades up after name lands */
.hero-role{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:rgba(255,255,255,.6);
  margin:0 0 20px;position:relative;z-index:1;
  letter-spacing:.05em;
  opacity:0;
  animation:fadeUp 0.5s ease 0.72s both;
}
/* Chips stagger in */
.hero-chips{
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;
  position:relative;z-index:1;
}
.hero-chip{
  height:30px;padding:0 14px;border-radius:var(--r-full);
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  color:rgba(255,255,255,.9);display:inline-flex;align-items:center;gap:6px;
  opacity:0;
  animation:chipPop 0.4s cubic-bezier(.34,1.6,.64,1) both;
}
.hero-chip:nth-child(1){animation-delay:.82s}
.hero-chip:nth-child(2){animation-delay:.92s}
.hero-chip:nth-child(3){animation-delay:1.02s}
.hero-chip:nth-child(4){animation-delay:1.12s}
.hero-chip .msr{font-size:14px;color:#74F8C3}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes chipPop{
  from{opacity:0;transform:scale(.6)}
  to{opacity:1;transform:scale(1)}
}

/* Re-trigger animation when panel reloads */
.hero-word,.hero-role,.hero-chip{animation-fill-mode:both}


/* ── HERO LOGO ORBIT ── */
.hero-logos{
  display:flex;align-items:center;justify-content:center;
  gap:10px;flex-wrap:wrap;
  position:relative;z-index:1;
  margin-bottom:16px;
}
.hero-logo-bubble{
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.25);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  animation:logoPop 0.45s cubic-bezier(.34,1.7,.64,1) both;
  transition:transform 0.2s, background 0.2s, box-shadow 0.2s;
  cursor:default;
}
.hero-logo-bubble:hover{
  transform:scale(1.18) translateY(-3px);
  background:rgba(255,255,255,.28);
  box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.hero-logo-bubble svg{width:26px;height:26px}
.hero-logo-bubble:nth-child(1){animation-delay:1.25s}
.hero-logo-bubble:nth-child(2){animation-delay:1.35s}
.hero-logo-bubble:nth-child(3){animation-delay:1.45s}
.hero-logo-bubble:nth-child(4){animation-delay:1.55s}
.hero-logo-bubble:nth-child(5){animation-delay:1.65s}
.hero-logo-bubble:nth-child(6){animation-delay:1.75s}
@keyframes logoPop{
  from{opacity:0;transform:scale(0) rotate(-20deg)}
  to{opacity:1;transform:scale(1) rotate(0deg)}
}

/* ── HERO CAPTION / QUIP ── */
.hero-quip{
  font-family:"JetBrains Mono",monospace;
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,.75);
  position:relative;z-index:1;
  letter-spacing:.02em;
  margin-bottom:0;
  display:flex;align-items:center;gap:8px;
  opacity:0;
  animation:fadeUp 0.5s ease 1.9s both;
}
.hero-quip::before,.hero-quip::after{
  content:"";display:block;
  height:1px;width:28px;
  background:rgba(255,255,255,.3);
  flex-shrink:0;
}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
/* KPI tiles — each a different Google Material color */
.kpi{
  border-radius:var(--r-xl);padding:16px 10px;text-align:center;
  box-shadow:var(--e1);position:relative;overflow:hidden;
  transition:box-shadow var(--dur-m),transform var(--dur-m);cursor:default;
}
.kpi:hover{box-shadow:var(--e3);transform:translateY(-3px) scale(1.02)}
.kpi-n{font-family:'Google Sans Display',sans-serif;font-size:30px;font-weight:700;line-height:1}
.kpi-l{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;opacity:.7;margin-top:5px}
/* Google Blue */
.kpi:nth-child(1){background:#E8F0FE;border-top:3px solid #1A73E8}
.kpi:nth-child(1) .kpi-n{color:#1A73E8}
.kpi:nth-child(1) .kpi-l{color:#174EA6}
/* Google Purple */
.kpi:nth-child(2){background:#F3E8FD;border-top:3px solid #9334E6}
.kpi:nth-child(2) .kpi-n{color:#9334E6}
.kpi:nth-child(2) .kpi-l{color:#681DA8}
/* Google Green */
.kpi:nth-child(3){background:#E6F4EA;border-top:3px solid #1E8E3E}
.kpi:nth-child(3) .kpi-n{color:#1E8E3E}
.kpi:nth-child(3) .kpi-l{color:#137333}
/* Google Red */
.kpi:nth-child(4){background:#FCE8E6;border-top:3px solid #D93025}
.kpi:nth-child(4) .kpi-n{color:#D93025}
.kpi:nth-child(4) .kpi-l{color:#A50E0E}

/* ── OPT TILES — Google color palette ── */
.opt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.opt-tile{
  border-radius:var(--r-xl);padding:18px;
  box-shadow:var(--e1);
  position:relative;overflow:hidden;
  transition:box-shadow var(--dur-m),transform var(--dur-m);
}
.opt-tile:hover{box-shadow:var(--e3);transform:translateY(-3px) scale(1.01)}
.opt-pct{font-family:'Google Sans Display',sans-serif;font-size:38px;font-weight:800;line-height:1}
.opt-what{font-size:13px;font-weight:600;margin-top:5px}
.opt-how{font-family:'JetBrains Mono',monospace;font-size:10px;margin-top:5px;line-height:1.55;opacity:.75}
/* Tile 1 — Google Purple (deep) */
.opt-tile:nth-child(1){background:#EDE7F6;border-left:4px solid #6200EE}
.opt-tile:nth-child(1) .opt-pct{color:#6200EE}
.opt-tile:nth-child(1) .opt-what{color:#20005E}
.opt-tile:nth-child(1) .opt-how{color:#4527A0}
/* Tile 2 — Google Red */
.opt-tile:nth-child(2){background:#FCE8E6;border-left:4px solid #D93025}
.opt-tile:nth-child(2) .opt-pct{color:#D93025}
.opt-tile:nth-child(2) .opt-what{color:#7B0000}
.opt-tile:nth-child(2) .opt-how{color:#A50E0E}
/* Tile 3 — Google Purple (medium) */
.opt-tile:nth-child(3){background:#F3E8FD;border-left:4px solid #9334E6}
.opt-tile:nth-child(3) .opt-pct{color:#9334E6}
.opt-tile:nth-child(3) .opt-what{color:#38006B}
.opt-tile:nth-child(3) .opt-how{color:#681DA8}
/* Tile 4 — Google Pink/Red */
.opt-tile:nth-child(4){background:#FDE8EF;border-left:4px solid #E8256B}
.opt-tile:nth-child(4) .opt-pct{color:#E8256B}
.opt-tile:nth-child(4) .opt-what{color:#7B0030}
.opt-tile:nth-child(4) .opt-how{color:#B00050}

/* ── TECH ICON GRID ── */
.tech-scroll-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:14px;scrollbar-width:none}
.tech-scroll-row::-webkit-scrollbar{display:none}
.tech-icon-card{
  flex-shrink:0;width:80px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--md-surf-low);border-radius:var(--r-lg);
  padding:14px 8px;box-shadow:var(--e1);
  border:1px solid var(--md-outline-variant);
  transition:box-shadow var(--dur-m),transform var(--dur-m),border-color var(--dur-m),background var(--dur-m);
  cursor:default;
  position:relative;overflow:hidden;
}
/* Red glow state-layer on hover */
.tech-icon-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:radial-gradient(circle at 50% 45%, rgba(217,48,37,.18) 0%, transparent 70%);
  opacity:0;transition:opacity var(--dur-m);pointer-events:none;
}
.tech-icon-card:hover{
  box-shadow:var(--e3),0 0 20px rgba(217,48,37,.2);
  transform:translateY(-4px) scale(1.06);
  border-color:#D93025;
  background:#FFF5F5;
}
.tech-icon-card:hover::after{opacity:1}
.tech-icon-card:hover svg{filter:drop-shadow(0 0 6px rgba(217,48,37,.5)) saturate(1.4)}
.tech-icon-card svg{width:36px;height:36px;transition:filter var(--dur-m),transform var(--dur-m)}
.tech-icon-card:hover svg{transform:scale(1.1)}
.tech-icon-card .tech-name{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  color:var(--md-on-surface-variant);text-align:center;
  letter-spacing:.04em;text-transform:uppercase;line-height:1.3;
  transition:color var(--dur-m);
}
.tech-icon-card:hover .tech-name{color:#D93025}

/* ── SECTION HEAD ── */
.sec-head{display:flex;align-items:center;gap:8px;margin:18px 0 12px}
.sec-head .msr{font-size:20px;color:var(--md-primary)}
.sec-title{font-size:16px;font-weight:500;color:var(--md-on-surface)}

/* ── M3 CARDS ── */
.card-el{background:var(--md-surf-low);border-radius:var(--r-xl);padding:20px;margin-bottom:12px;box-shadow:var(--e1);position:relative;overflow:hidden;transition:box-shadow var(--dur-m)}
.card-el::before{content:'';position:absolute;inset:0;background:var(--md-primary);opacity:.04;pointer-events:none}
.card-el:hover{box-shadow:var(--e2)}
.card-fi{background:var(--md-secondary-container);border-radius:var(--r-xl);padding:20px;margin-bottom:12px}
.card-te{background:var(--md-tertiary-container);border-radius:var(--r-xl);padding:20px;margin-bottom:12px}
.card-ou{background:var(--md-surf-lowest);border:1px solid var(--md-outline-variant);border-radius:var(--r-xl);padding:20px;margin-bottom:12px}
.card-to{background:color-mix(in srgb,var(--md-primary) 7%,var(--md-surf-c));border-radius:var(--r-xl);padding:20px;margin-bottom:12px}

/* ── TIMELINE ── */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--md-primary),var(--md-tertiary),var(--md-secondary));border-radius:var(--r-full)}
.tl-item{position:relative;margin-bottom:12px}
.tl-dot{position:absolute;left:-24px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--md-primary);border:2px solid var(--md-surface);box-shadow:0 0 0 2px var(--md-primary)}
.tl-card{background:var(--md-surf-low);border-radius:var(--r-lg);padding:14px 16px;box-shadow:var(--e1);transition:box-shadow var(--dur-m)}
.tl-card:hover{box-shadow:var(--e2)}
.tl-co{font-size:13px;font-weight:700;color:var(--md-primary)}
.tl-period{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--md-on-surface-variant)}
.tl-title{font-size:15px;font-weight:500;color:var(--md-on-surface);margin-top:4px}

/* ── LIST ITEMS ── */
.m3-li{display:flex;align-items:flex-start;gap:14px;padding:11px 4px;border-bottom:1px solid var(--md-surf-highest)}
.m3-li:last-child{border-bottom:none}
.m3-lead{width:40px;height:40px;border-radius:var(--r-md);background:var(--md-primary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m3-lead .msr{font-size:20px;color:var(--md-primary)}
.m3-lh{font-size:16px;font-weight:500;color:var(--md-on-surface)}
.m3-ls{font-size:14px;color:var(--md-on-surface-variant);margin-top:2px;line-height:1.5}

/* ── CHIPS ── */
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.m3-chip{height:32px;padding:0 16px;border-radius:var(--r-full);border:1px solid var(--md-outline);background:transparent;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;color:var(--md-on-surface-variant);display:inline-flex;align-items:center;gap:5px;cursor:default;transition:background var(--dur-s),border-color var(--dur-s)}
.m3-chip:hover{background:color-mix(in srgb,var(--md-primary) 8%,transparent)}
.m3-chip.on{background:var(--md-primary-container);border-color:transparent;color:var(--md-on-primary-container)}
.m3-chip.on .msr{color:var(--md-primary)}
.m3-chip .msr{font-size:14px}

/* ── CONTACT ── */
.contact-item{display:flex;align-items:center;gap:14px;padding:10px 8px;border-radius:var(--r-lg);text-decoration:none;color:inherit;position:relative;overflow:hidden;transition:background var(--dur-s)}
.contact-item:hover{background:color-mix(in srgb,var(--md-primary) 8%,transparent)}
.cico{width:46px;height:46px;border-radius:var(--r-md);background:var(--md-primary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cico .msr{font-size:22px;color:var(--md-primary)}

/* ── PROGRESS ── */
.prog-item{margin-bottom:13px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-row span:first-child{font-size:13px;font-weight:500;color:var(--md-on-surface)}
.prog-row span:last-child{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--md-primary)}
.prog-track{height:6px;background:var(--md-surf-highest);border-radius:var(--r-full);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--md-primary),var(--md-tertiary));width:0;transition:width .9s var(--ease-dec)}

/* ── FAB ── */
.m3-fab{position:fixed;bottom:24px;right:24px;z-index:100;height:56px;padding:0 20px;border-radius:var(--r-lg);background:var(--md-primary-container);color:var(--md-on-primary-container);border:none;cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Google Sans',sans-serif;font-size:14px;font-weight:500;box-shadow:var(--e3);transition:box-shadow var(--dur-m),transform var(--dur-m)}
.m3-fab:hover{box-shadow:var(--e4);transform:scale(1.02)}.m3-fab:active{transform:scale(.98)}
.m3-fab .msr{font-size:24px}

/* ── TYPE ── */
.ts-disp{font-family:'Google Sans Display',sans-serif;font-size:36px;line-height:44px;font-weight:400;color:var(--md-on-surface)}
.ts-hlmd{font-family:'Google Sans',sans-serif;font-size:24px;line-height:32px;font-weight:400;color:var(--md-on-surface);margin-bottom:4px}
.ts-body{font-size:15px;line-height:24px;color:var(--md-on-surface-variant)}
.ts-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--md-primary);margin-bottom:4px}
.ts-titlg{font-family:'Google Sans',sans-serif;font-size:22px;font-weight:500;color:var(--md-on-surface)}
.ts-titmd{font-size:16px;font-weight:500;color:var(--md-on-surface)}
.ts-labll{font-size:14px;font-weight:500;color:var(--md-on-surface-variant)}

/* ─────────────────────────────────────
   DETAIL SCREEN (node drill-in)
───────────────────────────────────── */
#detail{background:var(--md-surface);z-index:3;display:flex;flex-direction:column;overflow:hidden}
#detail.portal{animation:portalIn var(--dur-xl) var(--ease-dec) both}
@keyframes portalIn{from{clip-path:circle(0% at var(--px,50%) var(--py,50%))}to{clip-path:circle(170% at var(--px,50%) var(--py,50%))}}

.detail-scroll{flex:1;overflow-y:auto;overflow-x:hidden}

/* BANNER */
.m3-banner{width:100%;min-height:210px;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 28px;position:relative;overflow:hidden}
.ban-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:32px 32px}
.ban-glyph{position:absolute;right:16px;bottom:-10px;font-size:150px;color:rgba(255,255,255,.07);pointer-events:none;line-height:1}
.ban-over{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:6px;position:relative;z-index:1}
.ban-h{font-family:'Google Sans Display',sans-serif;font-size:40px;font-weight:400;line-height:1.1;color:#fff;position:relative;z-index:1;text-shadow:0 2px 12px rgba(0,0,0,.25)}
.ban-sub{font-family:'JetBrains Mono',monospace;font-size:12px;color:rgba(255,255,255,.65);margin-top:6px;position:relative;z-index:1}
.b-thia{background:linear-gradient(145deg,#003D8F,#0057CC,#0066E0)}
.b-jpmc{background:linear-gradient(145deg,#00009B,#0033A0,#0044B8)}
.b-ey  {background:linear-gradient(145deg,#1A1A1A,#2E2E00,#5C5C00)}
.b-proj{background:linear-gradient(145deg,#002B2D,#004D40,#00695C)}
.b-sk  {background:linear-gradient(145deg,#1A0533,#4A148C,#6A1B9A)}

.m3-content{padding:16px;max-width:880px;margin:0 auto;padding-bottom:80px}

/* Pipeline viz */
.pipe-surf{background:var(--md-surf-c);border-radius:var(--r-lg);padding:16px;overflow-x:auto;margin-top:12px}
.pipe-flow{display:flex;align-items:center;gap:4px;min-width:max-content}
.pipe-node{background:var(--md-surf-lowest);border-radius:var(--r-md);padding:9px 13px;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:var(--e1);border:1px solid var(--md-outline-variant);white-space:nowrap;min-width:72px}
.pipe-node .msr{font-size:20px;margin-bottom:2px}
.pipe-node .pn-l{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--md-on-surface)}
.pipe-node .pn-t{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-top:1px}
.pipe-node.src{border-top:3px solid #E8710A}.pipe-node.src .msr,.pipe-node.src .pn-t{color:#E8710A}
.pipe-node.trn{border-top:3px solid var(--md-primary)}.pipe-node.trn .msr,.pipe-node.trn .pn-t{color:var(--md-primary)}
.pipe-node.orc{border-top:3px solid var(--md-tertiary)}.pipe-node.orc .msr,.pipe-node.orc .pn-t{color:var(--md-tertiary)}
.pipe-node.snk{border-top:3px solid #7209B7}.pipe-node.snk .msr,.pipe-node.snk .pn-t{color:#7209B7}
.pipe-arr{font-size:18px;color:var(--md-outline);padding:0 2px}

.opt-band{background:color-mix(in srgb,var(--md-primary) 8%,var(--md-surf-low));border-radius:var(--r-xl);padding:20px;margin-bottom:12px;border-left:4px solid var(--md-primary)}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.opt-gtile{background:var(--md-surf-lowest);border-radius:var(--r-lg);padding:14px;box-shadow:var(--e1);border-top:3px solid var(--md-primary);position:relative;overflow:hidden}
.opt-gtile::before{content:'';position:absolute;inset:0;background:var(--md-primary);opacity:.03}
.og-pct{font-family:'Google Sans Display',sans-serif;font-size:32px;font-weight:700;color:var(--md-primary);line-height:1}
.og-what{font-size:12px;font-weight:500;color:var(--md-on-surface);margin-top:4px}
.og-how{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--md-on-surface-variant);margin-top:4px;line-height:1.5}

/* ── M3 DIVIDER ── */
.m3-div{height:1px;background:var(--md-outline-variant);margin:6px 0 14px}

/* ─────────────────────────────────────
   WORLD SCREEN (game map)
───────────────────────────────────── */
#world{background:var(--g-bg);overflow:hidden;z-index:1}
#bg-canvas{position:absolute;inset:0;pointer-events:none}
.hud{position:absolute;top:0;left:0;right:0;height:60px;z-index:10;background:rgba(5,10,26,.88);backdrop-filter:blur(20px) saturate(160%);border-bottom:1px solid rgba(94,148,255,.12);display:flex;align-items:center;padding:0 20px;gap:12px}
.hud-logo{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--g-accent);letter-spacing:.1em;flex:1}
.hud-logo em{color:rgba(255,255,255,.28);font-style:normal}
.hud-chip{height:28px;padding:0 12px;border-radius:var(--r-full);border:1px solid rgba(94,148,255,.22);background:rgba(94,148,255,.06);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--g-accent);display:flex;align-items:center;gap:5px}
.hud-chip .dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.5)}}

.nodes-layer{position:absolute;inset:60px 0 0;pointer-events:none}
.gnode{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;pointer-events:all;user-select:none;transition:transform 200ms var(--ease-dec)}
.gnode:hover{transform:translate(-50%,-50%) scale(1.1) translateY(-5px)}
.gnode:active{transform:translate(-50%,-50%) scale(.96)}
.gnode-body{position:relative;display:flex;align-items:center;justify-content:center}
.gnode-pulse{position:absolute;border-radius:50%;border:1px solid var(--nc);opacity:.15;animation:nodePulse 3.5s ease-in-out infinite}
@keyframes nodePulse{0%,100%{transform:scale(1.16);opacity:.15}50%{transform:scale(1.24);opacity:.04}}
.gnode-spin{position:absolute;border-radius:50%;border:1.5px dashed var(--nc);opacity:.28;animation:spinCW 12s linear infinite}
.gnode.hero .gnode-spin{animation-duration:7s}
@keyframes spinCW{to{transform:rotate(360deg)}}
.gnode-disc{border-radius:50%;background:rgba(5,10,26,.93);border:2px solid var(--nc);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:box-shadow 200ms var(--ease-std);box-shadow:0 0 18px var(--nc-dim),var(--e2)}
.gnode-disc::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--nc);opacity:.07;transition:opacity 200ms}
.gnode:hover .gnode-disc{box-shadow:0 0 38px var(--nc-dim),var(--e4)}
.gnode:hover .gnode-disc::before{opacity:.16}
.gnode-icon{font-size:36px;color:var(--nc);filter:drop-shadow(0 0 5px var(--nc));position:relative;z-index:1}
.gnode.hero .gnode-icon{font-size:46px}
.gnode-label{background:rgba(5,10,26,.88);border:1px solid var(--nc);border-radius:var(--r-full);padding:3px 13px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:rgba(255,255,255,.88);letter-spacing:.05em;white-space:nowrap;backdrop-filter:blur(8px)}

.game-hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:rgba(5,10,26,.92);border:1px solid rgba(94,148,255,.18);border-radius:var(--r-xl);padding:10px 22px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:9px;white-space:nowrap;animation:hintFloat 3.5s ease-in-out infinite;backdrop-filter:blur(10px);z-index:10}
@keyframes hintFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.game-hint .msr{font-size:16px;color:var(--g-accent)}

.g-tooltip{position:fixed;z-index:200;background:rgba(5,10,26,.97);border:1px solid rgba(94,148,255,.3);border-radius:var(--r-lg);padding:9px 16px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#fff;pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px);opacity:0;transition:opacity var(--dur-s)}
.g-tooltip.show{opacity:1}
.g-tooltip .tt-t{display:block;color:var(--g-accent);font-size:12px;font-weight:500;margin-bottom:2px}

.g-ripple{position:fixed;pointer-events:none;z-index:999;width:80px;height:80px;border-radius:50%;border:2px solid var(--g-accent);transform:translate(-50%,-50%);animation:ripOut .7s var(--ease-std) forwards}
@keyframes ripOut{from{transform:translate(-50%,-50%) scale(.3);opacity:1}to{transform:translate(-50%,-50%) scale(4);opacity:0}}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .opt-row{grid-template-columns:1fr}
  .opt-grid{grid-template-columns:1fr}
  .nav-rail{width:72px}
  .hero-name{font-size:34px}
  .hud .hud-chip:nth-child(n+4){display:none}
  .ban-h{font-size:30px}
}
</style>
</head>

     HOME SCREEN (landing)
═══════════════════════════════════ -->

  <div class="top-bar" id="home-top-bar">

/* ════════════════════════════════════════

════════════════════════════════════════ */

  {id:'home',  label:'VJ.HOME',    icon:'person',         color:'#5E94FF', xp:50,yp:46,hero:true,  tt:['Viswanth Jaladi','Tap to view full portfolio']},
  {id:'thia',  label:'THIA',       icon:'cloud',          color:'#87CFE8', xp:23,yp:23,tt:['THIA Platform','06/2024–Present · Multi-tenant GCP Data Platform']},
  {id:'jpmc',  label:'JPMC',       icon:'account_balance',color:'#FFD080', xp:75,yp:23,tt:['JPMorgan Chase','08/2023–06/2024 · Consumer Banking Pipelines']},
  {id:'ey',    label:'EY / IBM',   icon:'business_center',color:'#FF8A65', xp:20,yp:73,tt:['Ernst & Young / IBM','07/2019–07/2021 · ETL & Data Routing']},
  {id:'proj',  label:'Whoop IoT',  icon:'sensors',        color:'#80CBC4', xp:78,yp:73,tt:['Whoop IoT Platform','Personal · GCP + Terraform + BigQuery']},
  {id:'skills',label:'Tech Stack', icon:'storage',        color:'#CE93D8', xp:50,yp:85,tt:['Technical Skills','Python · PySpark · GCP · Iceberg · Airflow']},
];
const PIPES=[['home','thia'],['home','jpmc'],['home','ey'],['home','proj'],['home','skills'],['thia','jpmc'],['ey','skills'],['proj','skills']];

const cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
let W,H;
const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};
resize(); window.addEventListener('resize',()=>{resize();posNodes()});
const npos=id=>{const n=NODES.find(x=>x.id===id);return{x:n.xp/100*W,y:60+n.yp/100*(H-60)}};
const pts=[];
const initPts=()=>{pts.length=0;PIPES.forEach(([a,b])=>{for(let i=0;i<3;i++)pts.push({ab:[a,b],t:Math.random(),sp:.0005+Math.random()*.0008,rev:Math.random()>.5})})};
initPts();
let tick=0;
const drawWorld=()=>{
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
  bg.addColorStop(0,'#0A1428');bg.addColorStop(.6,'#060C1A');bg.addColorStop(1,'#030609');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  [[48,'rgba(94,148,255,.04)'],[16,'rgba(94,148,255,.012)']].forEach(([s,c])=>{
    ctx.strokeStyle=c;ctx.lineWidth=1;
    for(let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=60;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  });
  PIPES.forEach(([aId,bId])=>{
    const a=npos(aId),b=npos(bId),na=NODES.find(x=>x.id===aId),nb=NODES.find(x=>x.id===bId);
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2-40;
    ctx.save();
    const gr=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    gr.addColorStop(0,na.color+'28');gr.addColorStop(1,nb.color+'28');
    ctx.strokeStyle=gr;ctx.lineWidth=2;ctx.setLineDash([8,7]);ctx.lineDashOffset=-tick*22;
    ctx.shadowColor=na.color;ctx.shadowBlur=4;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(mx,my,b.x,b.y);ctx.stroke();ctx.restore();
  });
  pts.forEach(p=>{
    const[aId,bId]=p.ab,pa2=npos(aId),pb=npos(bId),na=NODES.find(x=>x.id===aId);
    const t=p.rev?1-p.t:p.t,mx=(pa2.x+pb.x)/2,my=(pa2.y+pb.y)/2-40;
    const px=(1-t)*(1-t)*pa2.x+2*(1-t)*t*mx+t*t*pb.x;
    const py=(1-t)*(1-t)*pa2.y+2*(1-t)*t*my+t*t*pb.y;
    ctx.save();ctx.beginPath();ctx.arc(px,py,4.5,0,Math.PI*2);ctx.fillStyle=na.color+'18';ctx.fill();ctx.restore();
    ctx.save();ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fillStyle=na.color;ctx.shadowColor=na.color;ctx.shadowBlur=10;ctx.fill();ctx.restore();
    p.t+=p.sp;if(p.t>1)p.t=0;
  });
  tick+=.004;requestAnimationFrame(drawWorld);
};
drawWorld();

const buildNodes=()=>{
  const layer=document.getElementById('nodes-layer');layer.innerHTML='';
  NODES.forEach(n=>{
    const el=document.createElement('div');
    el.className='gnode'+(n.hero?' hero':'');el.id='gn-'+n.id;
    el.style.setProperty('--nc',n.color);el.style.setProperty('--nc-dim',n.color+'30');
    const ds=n.hero?110:86;
    el.innerHTML=`<div class="gnode-body" style="width:${ds}px;height:${ds}px">
      <div class="gnode-pulse" style="width:${ds+28}px;height:${ds+28}px;left:${-14}px;top:${-14}px"></div>
      <div class="gnode-spin" style="width:${ds+14}px;height:${ds+14}px;left:${-7}px;top:${-7}px"></div>
      <div class="gnode-disc" style="width:${ds}px;height:${ds}px"><span class="msr gnode-icon">${n.icon}</span></div>
    </div><div class="gnode-label">${n.label}</div>`;
    el.addEventListener('click',e=>openNode(n.id,e.clientX,e.clientY));
    el.addEventListener('mouseenter',e=>{document.getElementById('tt-t').textContent=n.tt[0];document.getElementById('tt-s').textContent=n.tt[1];document.getElementById('tooltip').classList.add('show');moveTT(e)});
    el.addEventListener('mousemove',moveTT);
    el.addEventListener('mouseleave',()=>document.getElementById('tooltip').classList.remove('show'));
    layer.appendChild(el);
  });
  posNodes();
};
const posNodes=()=>{const gh=innerHeight-60;NODES.forEach(n=>{const el=document.getElementById('gn-'+n.id);if(el){el.style.left=(n.xp/100*innerWidth)+'px';el.style.top=(60+n.yp/100*gh)+'px'}})};
const moveTT=e=>{const t=document.getElementById('tooltip');t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-36)+'px'};

/* ════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════ */
function openWorld() { showScreen('world'); }

function openNode(id, cx_, cy_) {
  if (id === 'home') { showScreen('home-screen'); return; }

  const rip=document.createElement('div');rip.className='g-ripple';rip.style.cssText=`left:${cx_}px;top:${cy_}px`;document.body.appendChild(rip);setTimeout(()=>rip.remove(),800);

  const titles={thia:'THIA Platform',jpmc:'JPMorgan Chase',ey:'EY / IBM',proj:'Whoop IoT Project',skills:'Tech Stack'};
  document.getElementById('bar-title').textContent=titles[id]||id;
  document.getElementById('dcontent').innerHTML=CONTENT[id]||'';

  const det=document.getElementById('detail');
  det.style.setProperty('--px',(cx_/innerWidth*100).toFixed(1)+'%');
  det.style.setProperty('--py',(cy_/innerHeight*100).toFixed(1)+'%');
  showScreen('detail');
  det.classList.remove('portal');void det.offsetWidth;det.classList.add('portal');
  const scr=document.getElementById('detail-scroll');scr.scrollTop=0;
  scr.onscroll=()=>document.getElementById('detail-top-bar').classList.toggle('scrolled',scr.scrollTop>8);
  setTimeout(triggerBars,600);
}

function goBack() {
  showScreen('world');
  document.getElementById('detail-top-bar').classList.remove('scrolled');
}

/* Wire back buttons */
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-fab').addEventListener('click', goBack);
document.addEventListener('keydown', e => { if(e.key==='Escape') { if(!document.getElementById('detail').classList.contains('off')) goBack(); else if(!document.getElementById('world').classList.contains('off')) showScreen('home-screen'); } });

/* Home scroll elevation */
document.getElementById('home-scroll').addEventListener('scroll', function() {
  document.getElementById('home-top-bar').classList.toggle('scrolled', this.scrollTop > 8);
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
buildNodes();
// Load first panel immediately
document.getElementById('home-panel').innerHTML = HOME_PANELS[0]();
