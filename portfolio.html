<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viswanth Jaladi — Data Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<style>

/* ═══════════════════════════════════════
   M3 TOKEN SYSTEM — TEAL SEED COLOR
═══════════════════════════════════════ */
:root {
  /* Primary tonal palette */
  --p10:#002117; --p20:#003827; --p30:#005236; --p40:#006C47;
  --p50:#00875C; --p60:#00A373; --p70:#27BF8C; --p80:#51DBA8;
  --p90:#74F8C3; --p95:#BAFDE1; --p99:#F3FFF8;

  /* Secondary */
  --s10:#0D2119; --s20:#22372D; --s30:#394E43; --s40:#506659;
  --s80:#B6D0C2; --s90:#D2EDDE; --s95:#EAFAF1;

  /* Tertiary */
  --t10:#001F2A; --t20:#093344; --t40:#2E6075; --t80:#87CFE8; --t90:#C3E8F8;

  /* Neutral */
  --n10:#191C1B; --n20:#2D3130; --n30:#444847; --n40:#5C5F5E;
  --n50:#747876; --n60:#8E9290; --n70:#A9ACAA; --n80:#C4C7C5;
  --n90:#E1E3E1; --n95:#EFF1EF; --n99:#FAFDF9;

  /* Neutral-variant */
  --nv20:#1F352A; --nv30:#354B3F; --nv50:#5B7268; --nv60:#748B81;
  --nv80:#B0CAC0; --nv90:#CCE8DC;

  /* ── LIGHT SCHEME ROLES ── */
  --md-primary:            #006C47;
  --md-on-primary:         #FFFFFF;
  --md-primary-container:  #74F8C3;
  --md-on-primary-container:#002117;

  --md-secondary:          #506659;
  --md-on-secondary:       #FFFFFF;
  --md-secondary-container:#D2EDDE;
  --md-on-secondary-container:#0D2119;

  --md-tertiary:           #2E6075;
  --md-on-tertiary:        #FFFFFF;
  --md-tertiary-container: #C3E8F8;
  --md-on-tertiary-container:#001F2A;

  --md-error:              #BA1A1A;
  --md-error-container:    #FFDAD6;
  --md-on-error-container: #410002;

  /* Surface roles — the depth system */
  --md-surface:            #F5FBF7;
  --md-on-surface:         #171D1A;
  --md-surface-variant:    #DBE5DE;
  --md-on-surface-variant: #3F4945;
  --md-outline:            #6F7973;
  --md-outline-variant:    #BFC9C2;

  --md-surface-c-lowest:   #FFFFFF;
  --md-surface-c-low:      #EFF5F1;
  --md-surface-c:          #E9F0EB;
  --md-surface-c-high:     #E4EAE6;
  --md-surface-c-highest:  #DEE4E0;

  --md-inverse-surface:    #2C3130;
  --md-inverse-on-surface: #ECF2EE;
  --md-inverse-primary:    #51DBA8;

  /* Tonal elevation overlays */
  --md-tonal-1: rgba(0,108,71,.05);
  --md-tonal-2: rgba(0,108,71,.08);
  --md-tonal-3: rgba(0,108,71,.11);
  --md-tonal-4: rgba(0,108,71,.12);
  --md-tonal-5: rgba(0,108,71,.14);

  /* Shadows */
  --md-elev-1: 0 1px 2px rgba(0,0,0,.3),0 1px 3px 1px rgba(0,0,0,.15);
  --md-elev-2: 0 1px 2px rgba(0,0,0,.3),0 2px 6px 2px rgba(0,0,0,.15);
  --md-elev-3: 0 4px 8px 3px rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.3);
  --md-elev-4: 0 6px 10px 4px rgba(0,0,0,.15),0 2px 3px rgba(0,0,0,.3);

  /* Shape */
  --shape-xs:  4px;  --shape-sm: 8px;  --shape-md: 12px;
  --shape-lg:  16px; --shape-xl: 28px; --shape-full: 9999px;

  /* Motion */
  --dur-s1:50ms; --dur-s2:100ms; --dur-m1:200ms; --dur-m2:300ms;
  --dur-l1:400ms; --dur-l2:500ms;
  --ease-std:     cubic-bezier(.2,0,0,1);
  --ease-std-dec: cubic-bezier(0,0,0,1);
  --ease-emp:     cubic-bezier(.2,0,0,1);
  --ease-emp-dec: cubic-bezier(.05,.7,.1,1);
  --ease-emp-acc: cubic-bezier(.3,0,.8,.15);

  /* Game theme */
  --g-bg:     #05100D;
  --g-accent: #51DBA8;
  --g-pipe:   #87CFE8;
  --g-warn:   #FFD080;
}

/* ═══════════════════════════════════════
   RESET
═══════════════════════════════════════ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:'Google Sans',system-ui,sans-serif; }
body { overflow:hidden; }
.msr { font-family:'Material Symbols Rounded'; font-style:normal; line-height:1; user-select:none; }

/* ═══════════════════════════════════════
   SCREEN MANAGER — use display, not just opacity
   This is the fix for the stuck back button
═══════════════════════════════════════ */
.screen {
  position:fixed; inset:0;
  transition: opacity var(--dur-l1) var(--ease-emp),
              transform var(--dur-l1) var(--ease-emp);
}
.screen.off {
  opacity:0;
  transform:scale(.97);
  pointer-events:none;
  /* delayed display:none after transition */
  transition: opacity var(--dur-m2) var(--ease-emp-acc),
              transform var(--dur-m2) var(--ease-emp-acc),
              visibility 0s var(--dur-m2);
  visibility:hidden;
}
.screen.on {
  opacity:1;
  transform:scale(1);
  pointer-events:all;
  visibility:visible;
}

/* ═══════════════════════════════════════
   WORLD SCREEN
═══════════════════════════════════════ */
#world {
  background:var(--g-bg);
  overflow:hidden;
  z-index:1;
}
#bg-canvas { position:absolute; inset:0; pointer-events:none; }

/* HUD */
.hud {
  position:absolute; top:0; left:0; right:0; height:64px; z-index:10;
  background:rgba(5,16,13,.86);
  backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(81,219,168,.1);
  display:flex; align-items:center; padding:0 20px; gap:12px;
}
.hud-wordmark {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--g-accent); letter-spacing:.1em; flex:1;
}
.hud-wordmark em { color:rgba(255,255,255,.3); font-style:normal; }

.hud-chip {
  height:28px; padding:0 12px;
  border-radius:var(--shape-full);
  border:1px solid rgba(81,219,168,.22);
  background:rgba(81,219,168,.06);
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--g-accent);
  display:flex; align-items:center; gap:5px;
}
.hud-chip .dot {
  width:5px; height:5px; border-radius:50%;
  background:currentColor;
  animation:dot-pulse 2.4s ease-in-out infinite;
}
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.5)} }

/* NODES LAYER */
.nodes-layer { position:absolute; inset:64px 0 0; pointer-events:none; }

/* GAME NODE */
.gnode {
  position:absolute; transform:translate(-50%,-50%);
  display:flex; flex-direction:column; align-items:center; gap:7px;
  cursor:pointer; pointer-events:all; user-select:none;
  transition:transform var(--dur-m2) var(--ease-emp-dec);
}
.gnode:hover  { transform:translate(-50%,-50%) scale(1.1) translateY(-5px); }
.gnode:active { transform:translate(-50%,-50%) scale(.96); }

/* Node — 3 depth layers */
.gnode-body {
  position:relative;
  display:flex; align-items:center; justify-content:center;
}

/* Layer A: outer pulse ring */
.gnode-pulse {
  position:absolute; border-radius:50%;
  border:1px solid var(--nc);
  opacity:.18;
  animation:nodePulse 3.2s ease-in-out infinite;
}
@keyframes nodePulse { 0%,100%{transform:scale(1.14);opacity:.18} 50%{transform:scale(1.22);opacity:.06} }

/* Layer B: spinning dashes */
.gnode-spin {
  position:absolute; border-radius:50%;
  border:1.5px dashed var(--nc);
  opacity:.3;
  animation:spinCW 11s linear infinite;
}
.gnode.hero .gnode-spin { animation-duration:7s; }
@keyframes spinCW { to{transform:rotate(360deg)} }

/* Layer C: the disc */
.gnode-disc {
  border-radius:50%;
  background:rgba(5,16,13,.92);
  border:2px solid var(--nc);
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  transition:box-shadow var(--dur-m2) var(--ease-std);
  box-shadow:0 0 18px var(--nc-dim), var(--md-elev-2);
}
.gnode-disc::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:var(--nc); opacity:.07;
  transition:opacity var(--dur-m1);
}
.gnode:hover .gnode-disc {
  box-shadow:0 0 36px var(--nc-dim), var(--md-elev-4);
}
.gnode:hover .gnode-disc::before { opacity:.16; }

.gnode-icon {
  font-size:36px; color:var(--nc);
  filter:drop-shadow(0 0 5px var(--nc));
  position:relative; z-index:1;
}
.gnode.hero .gnode-icon { font-size:46px; }

/* node sizes */
.gnode-disc { width:88px; height:88px; }
.gnode-spin { inset:-7px; }
.gnode-pulse { inset:-14px; }
.gnode.hero .gnode-disc { width:112px; height:112px; }
.gnode.hero .gnode-spin { inset:-8px; }
.gnode.hero .gnode-pulse { inset:-16px; }

/* Company pill */
.gnode-label {
  background:rgba(5,16,13,.88);
  border:1px solid var(--nc);
  border-radius:var(--shape-full);
  padding:3px 13px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px; font-weight:500;
  color:rgba(255,255,255,.88);
  letter-spacing:.05em; white-space:nowrap;
  backdrop-filter:blur(8px);
}

/* GAME HINT */
.game-hint {
  position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(5,16,13,.9);
  border:1px solid rgba(81,219,168,.18);
  border-radius:var(--shape-xl);
  padding:10px 22px;
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:rgba(255,255,255,.45);
  display:flex; align-items:center; gap:9px; white-space:nowrap;
  animation:hintFloat 3.5s ease-in-out infinite;
  backdrop-filter:blur(10px); z-index:10;
}
@keyframes hintFloat {
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-6px)}
}
.game-hint .msr { font-size:16px; color:var(--g-accent); }

/* TOOLTIP */
.g-tooltip {
  position:fixed; z-index:200;
  background:rgba(5,16,13,.97);
  border:1px solid rgba(81,219,168,.28);
  border-radius:var(--shape-lg);
  padding:9px 16px;
  font-family:'JetBrains Mono',monospace; font-size:11px; color:#fff;
  pointer-events:none; white-space:nowrap;
  backdrop-filter:blur(16px);
  opacity:0; transition:opacity var(--dur-s2);
}
.g-tooltip.show { opacity:1; }
.g-tooltip .tt-t { display:block; color:var(--g-accent); font-size:12px; font-weight:500; margin-bottom:2px; }

/* RIPPLE */
.g-ripple {
  position:fixed; pointer-events:none; z-index:999;
  width:80px; height:80px; border-radius:50%;
  border:2px solid var(--g-accent);
  transform:translate(-50%,-50%);
  animation:rippleOut .7s var(--ease-std-dec) forwards;
}
@keyframes rippleOut {
  from { transform:translate(-50%,-50%) scale(.3); opacity:1; }
  to   { transform:translate(-50%,-50%) scale(4);  opacity:0; }
}

/* ═══════════════════════════════════════
   DETAIL SCREEN — FULL M3 LIGHT
═══════════════════════════════════════ */
#detail {
  background:var(--md-surface);
  z-index:2;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* Portal entry */
#detail.portal {
  animation:portalIn var(--dur-l2) var(--ease-emp-dec) both;
}
@keyframes portalIn {
  from { clip-path:circle(0% at var(--px,50%) var(--py,50%)); }
  to   { clip-path:circle(170% at var(--px,50%) var(--py,50%)); }
}

/* ── M3 TOP APP BAR ── */
.top-bar {
  flex-shrink:0;
  background:var(--md-surface-c-low);
  border-bottom:1px solid transparent;
  transition:background var(--dur-m1) var(--ease-std),
             border-color var(--dur-m1) var(--ease-std),
             box-shadow var(--dur-m1) var(--ease-std);
}
.top-bar.scrolled {
  background:color-mix(in srgb, var(--md-primary) 8%, var(--md-surface-c-low));
  border-color:var(--md-outline-variant);
  box-shadow:var(--md-elev-2);
}
.top-bar-row {
  display:flex; align-items:center;
  height:64px; padding:0 4px; gap:4px;
}

/* M3 Icon Button */
.m3-ibtn {
  width:48px; height:48px; border-radius:var(--shape-full);
  border:none; background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--md-on-surface);
  position:relative; overflow:hidden;
  transition:background var(--dur-s2);
  flex-shrink:0;
}
.m3-ibtn::after {
  content:''; position:absolute; inset:0;
  background:var(--md-on-surface); opacity:0;
  transition:opacity var(--dur-s2);
}
.m3-ibtn:hover::after { opacity:.08; }
.m3-ibtn:active::after { opacity:.12; }
.m3-ibtn .msr { font-size:24px; position:relative; z-index:1; }

.bar-title {
  flex:1; padding:0 4px;
  font-family:'Google Sans Display',sans-serif;
  font-size:22px; font-weight:400;
  color:var(--md-on-surface);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* SCROLL AREA */
.detail-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
}

/* ── HERO BANNER ── */
.m3-banner {
  width:100%; min-height:220px;
  display:flex; flex-direction:column;
  justify-content:flex-end; padding:24px 28px;
  position:relative; overflow:hidden;
}
.banner-bg-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:32px 32px;
}
.banner-glyph {
  position:absolute; right:16px; bottom:-10px;
  font-size:150px; color:rgba(255,255,255,.07);
  pointer-events:none; line-height:1; user-select:none;
}
.banner-overline {
  font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; letter-spacing:.14em;
  text-transform:uppercase; color:rgba(255,255,255,.6);
  margin-bottom:6px; position:relative; z-index:1;
}
.banner-h {
  font-family:'Google Sans Display',sans-serif;
  font-size:40px; font-weight:400; line-height:1.1;
  color:#fff; position:relative; z-index:1;
  text-shadow:0 2px 12px rgba(0,0,0,.25);
}
.banner-sub {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:rgba(255,255,255,.65);
  margin-top:6px; position:relative; z-index:1;
}
.b-home  { background:linear-gradient(145deg,#003827 0%,#006C47 55%,#009362 100%); }
.b-thia  { background:linear-gradient(145deg,#003D8F 0%,#0057CC 55%,#0066E0 100%); }
.b-jpmc  { background:linear-gradient(145deg,#00009B 0%,#0033A0 55%,#0044B8 100%); }
.b-ey    { background:linear-gradient(145deg,#1A1A1A 0%,#2E2E00 50%,#5C5C00 100%); }
.b-proj  { background:linear-gradient(145deg,#002B2D 0%,#004D40 55%,#00695C 100%); }
.b-skills{ background:linear-gradient(145deg,#1A0533 0%,#4A148C 55%,#6A1B9A 100%); }

/* ── M3 CONTENT AREA ── */
.m3-content { padding:16px; max-width:880px; margin:0 auto; padding-bottom:80px; }

/* ── M3 CARDS — proper tonal surface stack ── */
/* Elevated: surface-container-low + shadow + tonal overlay */
.card-el {
  background:var(--md-surface-c-low);
  border-radius:var(--shape-xl);
  padding:22px;
  margin-bottom:12px;
  box-shadow:var(--md-elev-1);
  position:relative; overflow:hidden;
  transition:box-shadow var(--dur-m1) var(--ease-std);
}
.card-el::before {
  content:''; position:absolute; inset:0;
  background:var(--md-primary); opacity:.05; pointer-events:none;
}
.card-el:hover { box-shadow:var(--md-elev-2); }

/* Filled: secondary-container */
.card-fi {
  background:var(--md-secondary-container);
  border-radius:var(--shape-xl);
  padding:22px; margin-bottom:12px;
}

/* Outlined: surface + border */
.card-ou {
  background:var(--md-surface-c-lowest);
  border:1px solid var(--md-outline-variant);
  border-radius:var(--shape-xl);
  padding:22px; margin-bottom:12px;
}

/* Tonal (surface-container + primary tint) */
.card-to {
  background:color-mix(in srgb, var(--md-primary) 8%, var(--md-surface-c));
  border-radius:var(--shape-xl);
  padding:22px; margin-bottom:12px;
}

/* ── TYPE SCALE ── */
.ts-disp-sm  { font-family:'Google Sans Display',sans-serif; font-size:36px; line-height:44px; font-weight:400; color:var(--md-on-surface); }
.ts-hl-lg    { font-family:'Google Sans Display',sans-serif; font-size:32px; line-height:40px; font-weight:400; color:var(--md-on-surface); }
.ts-hl-md    { font-family:'Google Sans',sans-serif; font-size:24px; line-height:32px; font-weight:400; color:var(--md-on-surface); }
.ts-hl-sm    { font-family:'Google Sans',sans-serif; font-size:20px; line-height:28px; font-weight:400; color:var(--md-on-surface); }
.ts-title-lg { font-family:'Google Sans',sans-serif; font-size:22px; line-height:28px; font-weight:500; color:var(--md-on-surface); }
.ts-title-md { font-family:'Google Sans',sans-serif; font-size:16px; line-height:24px; font-weight:500; color:var(--md-on-surface); }
.ts-body-lg  { font-size:16px; line-height:24px; font-weight:400; color:var(--md-on-surface-variant); }
.ts-body-md  { font-size:14px; line-height:20px; font-weight:400; color:var(--md-on-surface-variant); }
.ts-label-lg { font-size:14px; line-height:20px; font-weight:500; color:var(--md-on-surface-variant); }
.ts-label-md { font-family:'JetBrains Mono',monospace; font-size:11px; line-height:16px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--md-primary); }

/* ── STAT CARDS ── */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(108px,1fr)); gap:10px; margin-top:16px; }
.stat-card {
  background:var(--md-primary-container);
  border-radius:var(--shape-lg);
  padding:16px 12px; text-align:center;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute; inset:0;
  background:var(--md-primary); opacity:.05;
}
.stat-n {
  font-family:'Google Sans Display',sans-serif;
  font-size:28px; font-weight:700; line-height:1;
  color:var(--md-on-primary-container);
}
.stat-l {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; font-weight:500; letter-spacing:.07em; text-transform:uppercase;
  color:var(--md-on-primary-container); opacity:.65; margin-top:4px;
}

/* ── OPTIMIZATION CARDS ── */
.opt-band {
  background:color-mix(in srgb, var(--md-primary) 10%, var(--md-surface-c-low));
  border-radius:var(--shape-xl);
  padding:22px; margin-bottom:12px;
  border-left:4px solid var(--md-primary);
}
.opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.opt-tile {
  background:var(--md-surface-c-lowest);
  border-radius:var(--shape-lg);
  padding:14px;
  box-shadow:var(--md-elev-1);
  border-top:3px solid var(--md-primary);
  position:relative; overflow:hidden;
}
.opt-tile::before { content:''; position:absolute; inset:0; background:var(--md-primary); opacity:.03; }
.opt-pct { font-family:'Google Sans Display',sans-serif; font-size:34px; font-weight:700; color:var(--md-primary); line-height:1; }
.opt-what { font-size:12px; font-weight:500; color:var(--md-on-surface); margin-top:4px; line-height:1.4; }
.opt-how  { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--md-on-surface-variant); margin-top:4px; line-height:1.5; }

/* ── M3 CHIPS ── */
.chip-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
.m3-chip {
  height:32px; padding:0 16px;
  border-radius:var(--shape-full);
  border:1px solid var(--md-outline);
  background:transparent;
  font-family:'Google Sans',sans-serif; font-size:14px; font-weight:500;
  color:var(--md-on-surface-variant);
  display:inline-flex; align-items:center; gap:5px;
  cursor:default; position:relative; overflow:hidden;
  transition:background var(--dur-s2), border-color var(--dur-s2);
}
.m3-chip::after {
  content:''; position:absolute; inset:0;
  background:var(--md-on-surface); opacity:0;
  transition:opacity var(--dur-s2);
}
.m3-chip:hover::after { opacity:.08; }
.m3-chip.on {
  background:var(--md-secondary-container);

<body>

<!-- ═══════════════════════════════════

<script>
/* ═══════════════════════════════════════
   SCREEN MANAGEMENT — THE FIX
   Use a class toggle + visibility, never just opacity
═══════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) { s.classList.remove('off'); s.classList.add('on'); }
    else             { s.classList.remove('on');  s.classList.add('off'); }
  });
}

/* ═══════════════════════════════════════
   NODES DATA
═══════════════════════════════════════ */
const NODES = [
  { id:'home',   label:'VJ.HOME',      icon:'person',          color:'#51DBA8', xp:50, yp:46, hero:true,
    tt:['Viswanth Jaladi','Certified Data Engineer · Brandon, FL'] },
  { id:'thia',   label:'THIA',          icon:'cloud',           color:'#87CFE8', xp:23, yp:23,
    tt:['THIA Platform','06/2024–Present · Multi-tenant GCP Data Platform'] },
  { id:'jpmc',   label:'JPMC',          icon:'account_balance', color:'#FFD080', xp:75, yp:23,
    tt:['JPMorgan Chase','08/2023–06/2024 · Consumer Banking Pipelines'] },
  { id:'ey',     label:'EY / IBM',      icon:'business_center', color:'#FF8A65', xp:20, yp:73,
    tt:['Ernst & Young / IBM','07/2019–07/2021 · ETL & Data Routing'] },
  { id:'proj',   label:'Whoop IoT',     icon:'sensors',         color:'#80CBC4', xp:78, yp:73,
    tt:['Whoop IoT Platform','Personal · GCP + Terraform + BigQuery'] },
  { id:'skills', label:'Tech Stack',    icon:'storage',         color:'#CE93D8', xp:50, yp:85,
    tt:['Technical Skills','Python · PySpark · GCP · Iceberg · Airflow'] },
];

const PIPES = [
  ['home','thia'],['home','jpmc'],['home','ey'],
  ['home','proj'],['home','skills'],
  ['thia','jpmc'],['ey','skills'],['proj','skills'],
];

/* ═══════════════════════════════════════
   CANVAS
═══════════════════════════════════════ */
const cv  = document.getElementById('bg-canvas');
const ctx = cv.getContext('2d');
let W, H;
const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
resize();
window.addEventListener('resize', () => { resize(); posNodes(); });

const npos = id => {
  const n = NODES.find(x => x.id === id);
  return { x: n.xp/100*W, y: 64 + n.yp/100*(H-64) };
};

const pts = [];
const initPts = () => {
  pts.length = 0;
  PIPES.forEach(([a,b]) => {
    for (let i=0;i<3;i++) pts.push({ ab:[a,b], t:Math.random(), sp:.0005+Math.random()*.0008, rev:Math.random()>.5 });
  });
};
initPts();

let tick = 0;
const draw = () => {
  ctx.clearRect(0,0,W,H);

  // bg
  const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.8);
  bg.addColorStop(0,'#0B201A'); bg.addColorStop(.6,'#07130F'); bg.addColorStop(1,'#030A07');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // dual grid
  [[48,'rgba(81,219,168,.04)'],[16,'rgba(81,219,168,.012)']].forEach(([s,c]) => {
    ctx.strokeStyle = c; ctx.lineWidth = 1;
    for (let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for (let y=64;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  });

  // pipes
  PIPES.forEach(([aId,bId]) => {
    const a=npos(aId), b=npos(bId);
    const na=NODES.find(x=>x.id===aId), nb=NODES.find(x=>x.id===bId);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2-40;

    ctx.save();
    const gr = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    gr.addColorStop(0, na.color+'2A'); gr.addColorStop(1, nb.color+'2A');
    ctx.strokeStyle = gr; ctx.lineWidth = 2;
    ctx.setLineDash([8,7]); ctx.lineDashOffset = -tick*22;
    ctx.shadowColor = na.color; ctx.shadowBlur = 5;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.quadraticCurveTo(mx,my,b.x,b.y);
    ctx.stroke(); ctx.restore();
  });

  // particles
  pts.forEach(p => {
    const [aId,bId] = p.ab;
    const pa=npos(aId), pb=npos(bId);
    const na=NODES.find(x=>x.id===aId);
    const t = p.rev ? 1-p.t : p.t;
    const mx=(pa.x+pb.x)/2, my=(pa.y+pb.y)/2-40;
    const px=(1-t)*(1-t)*pa.x+2*(1-t)*t*mx+t*t*pb.x;
    const py=(1-t)*(1-t)*pa.y+2*(1-t)*t*my+t*t*pb.y;

    ctx.save();
    ctx.beginPath(); ctx.arc(px,py,4.5,0,Math.PI*2);
    ctx.fillStyle = na.color+'18'; ctx.fill(); ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2);
    ctx.fillStyle = na.color;
    ctx.shadowColor = na.color; ctx.shadowBlur = 10;
    ctx.fill(); ctx.restore();

    p.t += p.sp; if(p.t>1) p.t=0;
  });

  tick += .004;
  requestAnimationFrame(draw);
};
draw();

/* ═══════════════════════════════════════
   NODE ELEMENTS
═══════════════════════════════════════ */
const buildNodes = () => {
  const layer = document.getElementById('nodes-layer');
  layer.innerHTML = '';
  NODES.forEach(n => {
    const el = document.createElement('div');
    el.className = 'gnode' + (n.hero ? ' hero' : '');
    el.id = 'gn-' + n.id;
    el.style.setProperty('--nc', n.color);
    el.style.setProperty('--nc-dim', n.color + '30');
    const ds = n.hero ? 112 : 88;
    el.innerHTML = `
      <div class="gnode-body" style="width:${ds}px;height:${ds}px">
        <div class="gnode-pulse" style="width:${ds+28}px;height:${ds+28}px;left:${-14}px;top:${-14}px"></div>
        <div class="gnode-spin"  style="width:${ds+14}px;height:${ds+14}px;left:${-7}px;top:${-7}px"></div>
        <div class="gnode-disc"  style="width:${ds}px;height:${ds}px">
          <span class="msr gnode-icon">${n.icon}</span>
        </div>
      </div>
      <div class="gnode-label">${n.label}</div>`;
    el.addEventListener('click', e => openNode(n.id, e.clientX, e.clientY));
    el.addEventListener('mouseenter', e => showTT(n, e));
    el.addEventListener('mousemove',  moveTT);
    el.addEventListener('mouseleave', hideTT);
    layer.appendChild(el);
  });
  posNodes();
};

const posNodes = () => {
  const gh = innerHeight - 64;
  NODES.forEach(n => {
    const el = document.getElementById('gn-' + n.id);
    if (el) { el.style.left = (n.xp/100*innerWidth)+'px'; el.style.top = (64+n.yp/100*gh)+'px'; }
  });
};

const tt = document.getElementById('tooltip');

  document.querySelectorAll('.rail-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const idx = parseInt(btn.dataset.rail);
  document.getElementById('home-panel').innerHTML = HOME_PANELS[idx]();
  triggerProgressBars();
};

const triggerProgressBars = () => {
  setTimeout(() => {
    document.querySelectorAll('.prog-fill').forEach(el => {

    });
  }, 120);
};

function openNode(id, cx_, cy_) {
  // Ripple
  const rip = document.createElement('div');
  rip.className = 'g-ripple';
  rip.style.cssText = `left:${cx_}px;top:${cy_}px`;
  document.body.appendChild(rip);
  setTimeout(() => rip.remove(), 800);

  // Populate detail
  const titles = { home:'Viswanth Jaladi', thia:'THIA Platform', jpmc:'JPMorgan Chase', ey:'EY / IBM', proj:'Whoop IoT', skills:'Tech Stack' };
  document.getElementById('bar-title').textContent = titles[id] || id;
  document.getElementById('dcontent').innerHTML = CONTENT[id] || '';

  // Portal coordinates
  const det = document.getElementById('detail');
  det.style.setProperty('--px', (cx_/innerWidth*100).toFixed(1)+'%');
  det.style.setProperty('--py', (cy_/innerHeight*100).toFixed(1)+'%');

  // Show detail, hide world
  showScreen('detail');
  det.classList.remove('portal'); void det.offsetWidth; det.classList.add('portal');

  // Reset scroll
  const scr = document.getElementById('detail-scroll');
  scr.scrollTop = 0;
  scr.onscroll = () => {
    document.getElementById('top-bar').classList.toggle('scrolled', scr.scrollTop > 8);
  };

  // If home node, init first rail panel
  if (id === 'home') {
    setTimeout(() => {
      document.getElementById('home-panel').innerHTML = HOME_PANELS[0]();
      const hs = document.getElementById('home-scroll');
      if (hs) hs.onscroll = () => {
        document.getElementById('top-bar').classList.toggle('scrolled', hs.scrollTop > 8);
      };
    }, 60);
  }

  // Progress bars
  triggerProgressBars();
}

function goBack() {
  showScreen('world');
  document.getElementById('top-bar').classList.remove('scrolled');
}

/* Wire up back buttons — multiple approaches for reliability */
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-fab').addEventListener('click', goBack);
document.addEventListener('keydown', e => { if (e.key === 'Escape') goBack(); });

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
buildNodes();
</script>
